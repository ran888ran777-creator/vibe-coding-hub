services:
  postgres:
    image: postgres:16-alpine
    container_name: doc-workspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: doc_workspace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - doc_workspace_pgdata:/var/lib/postgresql/data

volumes:
  doc_workspace_pgdata:
