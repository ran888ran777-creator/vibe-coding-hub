<!DOCTYPE html>
<html lang="{{ site.LanguageCode | default `ru` }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
    <link rel="stylesheet" href="{{ "css/dark.css" | relURL }}">
  </head>
  <body class="{{ if site.Params.darkMode }}theme-dark{{ end }}">
    <div class="shell">
      <header class="site-header">
        <div class="brand-block">
          <a class="brand-mark" href="{{ "/" | relURL }}">{{ site.Title }}</a>
          <p class="brand-copy">{{ site.Params.description }}</p>
        </div>
        <nav class="site-nav" aria-label="Основная навигация">
          <a href="{{ "/" | relURL }}">Главная</a>
          {{ range site.Menus.main }}
            <a href="{{ .URL | relURL }}">{{ .Name }}</a>
          {{ end }}
        </nav>
      </header>

      <main class="site-main">
        {{ block "main" . }}{{ end }}
      </main>

      <footer class="site-footer">
        <div>
          <strong>{{ site.Title }}</strong>
          <p>Минималистичный хаб по Hugo, AI-воркфлоу и вайб-кодингу.</p>
        </div>
        <div class="footer-meta">
          <a href="{{ site.Params.repoURL }}">GitHub</a>
          <a href="{{ "index.xml" | relURL }}">RSS</a>
        </div>
      </footer>
    </div>

    <section class="search-shell" aria-label="Поиск">
      <div id="pagefind-search" data-pagefind-body></div>
    </section>

    <script src="{{ "pagefind/pagefind-ui.js" | relURL }}" defer></script>
    <script defer>
      document.addEventListener("DOMContentLoaded", function () {
        if (window.PagefindUI) {
          new window.PagefindUI({
            element: "#pagefind-search",
            showSubResults: true,
            resetStyles: false,
            translations: {
              placeholder: "Поиск по хабу",
              clear_search: "Очистить",
              load_more: "Показать ещё",
              search_label: "Поиск"
            }
          });
        }
      });
    </script>
  </body>
</html>
